# ============================================================
# Portfolio Backend – Docker Compose
# Stack: Quarkus 3 (JVM mode) + PostgreSQL 16
# ============================================================

services:

  # ──────────────────────────────────────────────
  # PostgreSQL database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_password}
    ports:
      - "${POSTGRES_PORT:-5633}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio_user} -d ${POSTGRES_DB:-portfolio_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-net

  # ──────────────────────────────────────────────
  # Quarkus application (JVM mode)
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      # --- Database ---
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-portfolio_db}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-portfolio_user}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_password}
      # --- Hibernate ---
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: ${HIBERNATE_DDL:-update}
      # --- HTTP ---
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_HTTP_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200}
      # --- Logging ---
      QUARKUS_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${APP_PORT:-9741}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/q/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - portfolio-net

# ──────────────────────────────────────────────
# Volumes & Networks
# ──────────────────────────────────────────────
volumes:
  postgres_data:
    name: portfolio_postgres_data

networks:
  portfolio-net:
    name: portfolio-network
    driver: bridge
