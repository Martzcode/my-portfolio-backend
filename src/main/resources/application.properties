# ============================================================
# application.properties – Portfolio Backend
# Les variables d'environnement Docker surchargent ces valeurs
# ============================================================

# ---------- Application ----------
quarkus.application.name=portfolio-backend
quarkus.application.version=1.0.0-SNAPSHOT

# ---------- HTTP ----------
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept

# ---------- DataSource (PostgreSQL) ----------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/portfolio_db}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:portfolio_user}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:portfolio_password}
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=20

# ---------- Hibernate ORM ----------
quarkus.hibernate-orm.database.generation=${QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION:update}
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ---------- OpenAPI / Swagger UI ----------
quarkus.smallrye-openapi.info-title=Portfolio & Blog API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API for developer portfolio and blog backend
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ---------- Logging ----------
quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# ============================================================
# Profile DEV (mode développement local)
# ============================================================
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.swagger-ui.always-include=true
%dev.quarkus.log.level=DEBUG

# ============================================================
# Profile TEST
# ============================================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
